<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 52" role="img" aria-label="Lisbon Business Leaders">
  <title>Lisbon Business Leaders</title>

  <!-- ── Bridge silhouette mark ── -->
  <!-- Road deck -->
  <line x1="0" y1="35" x2="51" y2="35" stroke="white" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Left tower shaft -->
  <rect x="11.5" y="10" width="3" height="25" fill="white"/>
  <!-- Left tower cap -->
  <rect x="9.5" y="7.5" width="7" height="3" fill="white"/>

  <!-- Right tower shaft -->
  <rect x="36.5" y="10" width="3" height="25" fill="white"/>
  <!-- Right tower cap -->
  <rect x="34.5" y="7.5" width="7" height="3" fill="white"/>

  <!-- Main span cable (catenary between towers) -->
  <path d="M13,8.5 Q25,21 38,8.5" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Left approach cable -->
  <path d="M0,27 L13,8.5" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Right approach cable -->
  <path d="M38,8.5 L51,27" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Vertical hangers (suspension wires) -->
  <line x1="5"  y1="22.5" x2="5"  y2="35" stroke="white" stroke-width="0.85" opacity="0.6"/>
  <line x1="19" y1="14"   x2="19" y2="35" stroke="white" stroke-width="0.85" opacity="0.6"/>
  <line x1="32" y1="14"   x2="32" y2="35" stroke="white" stroke-width="0.85" opacity="0.6"/>
  <line x1="46" y1="22.5" x2="46" y2="35" stroke="white" stroke-width="0.85" opacity="0.6"/>

  <!-- ── Organisation name ── -->
  <text x="63" y="22" font-family="Georgia,'Times New Roman',serif" font-size="16" font-weight="bold" fill="white" letter-spacing="2.5">LISBON</text>
  <line x1="63" y1="29" x2="189" y2="29" stroke="rgba(255,255,255,0.18)" stroke-width="0.75"/>
  <text x="63" y="42" font-family="Georgia,'Times New Roman',serif" font-size="8.5" fill="rgba(255,255,255,0.62)" letter-spacing="3">BUSINESS LEADERS</text>
</svg>
